description: The tax-free threshold within the meaning of the Income Tax Rates Act 1986, which net labour income must EXCEED for WATO entitlement (s 61-155(1)(b) ITAA 1997). $18,200 since 1 July 2012. Must stay in step with the first bracket threshold of wato/resident_tax_scale.
