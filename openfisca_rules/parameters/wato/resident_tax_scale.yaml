description: Resident individual basic income tax rate scale (Income Tax Rates Act 1986, Sch 7) - used to compute the s 61-160(b) hypothetical "basic income tax liability if taxable income were only net labour income". Carries the legislated first-bracket cuts 16% -> 15% (1 July 2026) -> 14% (1 July 2027), so the WATO phase-in rate is 14c/$ from commencement.
