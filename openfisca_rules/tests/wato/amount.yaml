# WATO amount (ruleset rules 1.2-1.3): lesser of $250 and basic tax on net labour
# income alone - so the offset phases in at 14c/$ between $18,200 and ~$19,986.

- name: phase-in - NLI $19,000 gives 14% of the $800 above the threshold
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 19000
  output:
    wato_entitled: true
    wato_tax_on_net_labour_income: 112       # (19000 - 18200) * 0.14
    wato_amount: 112
    wato_receives_full_amount: false

- name: boundary - one dollar over the threshold earns 14 cents of offset
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 18201
  output:
    wato_entitled: true
    wato_amount: 0.14

- name: boundary - NLI $19,985 (the factsheet's effective threshold) is still partial
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 19985
  output:
    wato_amount: 249.90                      # (19985 - 18200) * 0.14
    wato_receives_full_amount: false

- name: boundary - NLI $19,986 caps at the full $250
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 19986
  output:
    wato_amount: 250                         # min(250, 250.04)
    wato_receives_full_amount: true

- name: no upper taper - a $250,000 earner still gets the full $250
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 250000
  output:
    wato_amount: 250
    wato_receives_full_amount: true

- name: all five labour-amount components sum (s 61-155(2) paragraphs (a)-(e))
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 5000
    wato_sole_trader_business_income: 2000
    wato_personal_services_income: 8000
    wato_ess_discounts: 2000
    wato_labour_hire_payments: 4000
    wato_labour_deductions: 1000
  output:
    wato_labour_amounts: 21000
    wato_net_labour_income: 20000
    wato_amount: 250                         # tax on 20000 = 1800 * 0.14 = 252, capped
    wato_receives_full_amount: true

- name: labour deductions exceeding labour amounts floor net labour income at zero
  period: 2027
  input:
    wato_salary_and_wages: 10000
    wato_labour_deductions: 15000
  output:
    wato_net_labour_income: 0
    wato_entitled: false
    wato_amount: 0

- name: deductions can pull a full-offset earner back into the phase-in band
  period: 2027
  absolute_error_margin: 0.01
  input:
    wato_salary_and_wages: 20000
    wato_labour_deductions: 1000
  output:
    wato_net_labour_income: 19000
    wato_amount: 112
    wato_receives_full_amount: false
