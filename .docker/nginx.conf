# Serves the static showcase webapp and proxies api/ to the OpenFisca container.
# The webapp only uses relative URLs, so this works unchanged behind a reverse
# proxy that mounts the app under a path prefix (e.g. HAProxy replace-path).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the published ruleset/question .md files (webapp/rulesets/) and the
    # mirrored engine source files (webapp/files/ — .py variables, .yaml
    # parameters, .mermaid diagrams) as UTF-8 text so the "view" links render in
    # the browser. The Maintain-rules page's download links use the HTML
    # download attribute, which still forces a save.
    location ~ \.(md|py|yaml|yml|mermaid)$ {
        default_type text/plain;
        charset utf-8;
    }

    # Static assets change on every deploy but keep the same filenames (no
    # content hashing), so force revalidation instead of letting browsers
    # rely on heuristic caching — otherwise a redeploy can leave visitors
    # stuck on a stale CSS/JS bundle that no longer matches the HTML.
    location /assets/ {
        add_header Cache-Control "no-cache";
    }

    location ~ \.html$ {
        add_header Cache-Control "no-cache";
    }
}
