# Current-law negative gearing (ruleset section 1-2): before the 2027-28 reform,
# a rental loss is an ordinary deduction against other income (no quarantining).

- name: straightforward negative gearing - loss fully offsets other income
  period: 2026
  input:
    ng_entity_kind: individual
    ng_income_year_start_date: 2026-07-01
    ng_ownership_interest_acquired_date: 2020-01-01
    ng_rental_income: 20000
    ng_interest_and_ownership_expenses: 25000
  output:
    ng_total_deductible_expenses: 25000
    ng_net_rental_result: -5000
    ng_reform_commenced_for_year: false
    ng_quarantine_applies: false
    ng_negative_gearing_offset_available: 5000
    ng_current_year_quarantined_excess: 0

- name: capital works deduction (post-1992 construction) reduces the net result
  period: 2026
  input:
    ng_income_year_start_date: 2026-07-01
    ng_rental_income: 15000
    ng_construction_expenditure: 400000
    ng_construction_start_date: 2010-01-01
  output:
    ng_capital_works_deduction: 10000       # 400000 * 2.5%
    ng_total_deductible_expenses: 10000
    ng_net_rental_result: 5000
    ng_negative_gearing_offset_available: 0

- name: pre-1992 construction gets no modelled capital works deduction
  period: 2026
  input:
    ng_construction_expenditure: 100000
    ng_construction_start_date: 1985-01-01
  output:
    ng_capital_works_deduction: 0

- name: second-hand depreciating asset decline denied for an individual
  period: 2026
  input:
    ng_entity_kind: individual
    ng_second_hand_depreciating_asset_decline_claimed: 2000
  output:
    ng_exempt_from_current_law_denials: false
    ng_second_hand_asset_deductible_decline: 0

- name: second-hand depreciating asset decline allowed for a company
  period: 2026
  input:
    ng_entity_kind: company
    ng_second_hand_depreciating_asset_decline_claimed: 2000
  output:
    ng_exempt_from_current_law_denials: true
    ng_second_hand_asset_deductible_decline: 2000

- name: an SMSF is NOT excepted from the current-law second-hand-asset denial
  period: 2026
  input:
    ng_entity_kind: smsf
    ng_second_hand_depreciating_asset_decline_claimed: 2000
  output:
    ng_exempt_from_current_law_denials: false
    ng_second_hand_asset_deductible_decline: 0

- name: travel expenses denied for an individual, allowed for a widely held trust
  period: 2026
  input:
    ng_entity_kind: [individual, widely_held_trust]
    ng_travel_expense_claimed: [800, 800]
  output:
    ng_travel_deductible: [0, 800]

- name: vacant land holding costs denied without a rentable structure or business use
  period: 2026
  input:
    ng_holds_vacant_land: true
    ng_land_has_rentable_structure_or_business_use: false
    ng_vacant_land_holding_costs: 6000
  output:
    ng_vacant_land_deductible_costs: 0

- name: vacant land holding costs allowed once a rentable structure exists
  period: 2026
  input:
    ng_holds_vacant_land: true
    ng_land_has_rentable_structure_or_business_use: true
    ng_vacant_land_holding_costs: 6000
  output:
    ng_vacant_land_deductible_costs: 6000

- name: co-ownership splits the net result by legal ownership share, not agreement
  period: 2026
  input:
    ng_ownership_percentage: 0.5
    ng_rental_income: 20000
    ng_interest_and_ownership_expenses: 30000
  output:
    ng_net_rental_result: -5000        # 0.5 * (20000 - 30000)
    ng_negative_gearing_offset_available: 5000
