description: CGT discount percentage for individuals (s 115-100 ITAA 1997). Applies to a gain on an asset held at least 12 months. Abolished for gains accruing from 1 July 2027 under the Treasury Laws Amendment (Tax Reform No. 1) Act 2026 (handled in the formula by the CGT-event / accrual date, not by dropping this value).
